<label for="diary-entry-date">Entry Date:</label>
<input type="date" id="diary-entry-date" name="diary-entry-date" min="2020-07-21">

<script>
	  	var today = new Date();
		var dd = today.getDate();
		var mm = today.getMonth()+1; //January is 0!
		var yyyy = today.getFullYear();
		  if(dd<10){
			dd='0'+dd
		    } 
		    if(mm<10){
			mm='0'+mm
		   } 
		today = yyyy+'-'+mm+'-'+dd;
		document.getElementById("diary-entry-date").setAttribute("max", today);
	  </script>
