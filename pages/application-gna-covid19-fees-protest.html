<!doctype html>
<html>
  <head>
     <script>
     function listEntries(data){
     	arr = JSON.parse(data).feed.entry;
	stat = document.getElementById("stat");
	part = document.getElementById("part");
	     for(let i=9; i<=arr.length; i++){
		if(arr[i]["gs$cell"]["col"] == "9"){
			text = arr[i]["gs$cell"]["$t"];
			p = document.createElement("p");
			txt = document.createTextNode("\""+text+"\"");
			p.appendChild(txt);
			stat.appendChild(p);
	    	}
		     if(arr[i]["gs$cell"]["col"] == "4"){
			text = arr[i]["gs$cell"]["$t"];
			part.innerHTML = part.innerHTML + text + "&tab;";
		}
	     }
     }
	var xmlHttp = new XMLHttpRequest();
	xmlHttp.onreadystatechange = function() { 
    		if (xmlHttp.readyState == 4 && xmlHttp.status == 200){
        		text = xmlHttp.responseText.substring(28);
        		listEntries(text.substring(0, text.length-2));
		}
	}
     xmlHttp.open("GET", "https://spreadsheets.google.com/feeds/cells/1nrCk4IYoMnV9lcrQDqx0yIIynBmeKCz8KL1BUzevbXE/1/public/values?alt=json-in-script&callback=listEntries", true); 
     xmlHttp.send(null);
     </script>
  	<script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  </head>
  <body>
	  <h1 style="color: red;">Statements by Students</h1>
      <div id="stat"></div>
	  <h1 style="color: red;">Participating Students</h1>
      <p id="part"></p>
  </body>
</html>
