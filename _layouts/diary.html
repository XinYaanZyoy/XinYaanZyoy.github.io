	  <style>
		@import url(https://fonts.googleapis.com/css?family=Roboto);
		@import url(https://fonts.googleapis.com/css?family=Handlee);

		.paper {
		    position: relative;
		    width: 90%;
		    max-width: 800px;
		    min-width: 400px;
		    height: 480px;
		    margin: 0 auto;
		    background: #fafafa;
		    border-radius: 10px;
		    box-shadow: 0 2px 8px rgba(0,0,0,.3);
		    overflow: hidden;
		}
		.paper:before {
		    content: '';
		    position: absolute;
		    top: 0; bottom: 0; left: 0;
		    width: 60px;
		    background: radial-gradient(#575450 6px, transparent 7px) repeat-y;
		    background-size: 30px 30px;
		    border-right: 3px solid #D44147;
		    box-sizing: border-box;
		}

		.paper-content {
		    position: absolute;
		    top: 30px; right: 0; bottom: 30px; left: 60px;
		    background: linear-gradient(transparent, transparent 28px, #91D1D3 28px);
		    background-size: 30px 30px;
		}

		.paper-content textarea {
		    width: 100%;
		    max-width: 100%;
		    height: 100%;
		    max-height: 100%;
		    line-height: 30px;
		    padding: 0 10px;
		    border: 0;
		    outline: 0;
		    background: transparent;
		    color: mediumblue;
		    font-family: 'Handlee', cursive;
		    font-weight: bold;
		    font-size: 18px;
		    box-sizing: border-box;
		    z-index: 1;
		}

		footer {
		    margin-top: 30px;
		    text-align: center;
		    font-size: 12px;
		    color: rgba(0,0,0,.6);
		}
		footer a {
		    color: rgba(255,255,255,.8);
		}
	  </style>
	  <script>
		function putNote(datestring) {
			datearr = datestring.split('-');
			year = datearr[0];
			month = ()=>{
				if(datearr[1] == "01")
					return "Jan"
				if(datearr[1] == "02")
					return "Feb"
				if(datearr[1] == "03")
					return "Mar"
				if(datearr[1] == "04")
					return "Apr"
				if(datearr[1] == "05")
					return "May"
				if(datearr[1] == "06")
					return "Jun"
				if(datearr[1] == "07")
					return "Jul"
				if(datearr[1] == "08")
					return "Aug"
				if(datearr[1] == "09")
					return "Sep"
				if(datearr[1] == "10")
					return "Oct"
				if(datearr[1] == "11")
					return "Nov"
				if(datearr[1] == "12")
					return "Dec"
				}();
			date = datearr[2];
			diary = "https://raw.githubusercontent.com/XinYaanZyoy/XinYaanZyoy.github.io/master/diary";
			var url = diary + "/" + year + "/" + month() + "/" + date + ".txt";
			var xhr = new XMLHttpRequest();
			xhr.onreadystatechange = function() {
			    if (xhr.readyState == XMLHttpRequest.DONE) {
				document.getElementById("diary").innerHTML = xhr.responseText;
			    }
			}
			xhr.open('GET', url, true);
			xhr.send(null);
		}
	  </script>
  </head>
  <body>
	  {% include header.html %}
	  <hr>
    {% include navigation.html %}
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
	      <script>
	  	var today = new Date();
		var dd = today.getDate();
		var mm = today.getMonth()+1; //January is 0!
		var yyyy = today.getFullYear();
		  if(dd<10){
			dd='0'+dd
		    } 
		    if(mm<10){
			mm='0'+mm
		   } 
		today = yyyy+'-'+mm+'-'+dd;
		document.getElementById("diary-entry-date").setAttribute("max", today);
	  </script>
      </div>
    </main>
	  <hr>
	  {% include footer.html %}
  </body>
</html>
